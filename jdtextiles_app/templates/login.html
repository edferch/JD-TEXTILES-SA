<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - JD Textiles</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md border-t-4 border-blue-600">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-800 tracking-tight uppercase">JD Textiles</h1>
            <p class="text-gray-500 text-sm mt-2">Sistema de Control de Producción</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 text-xs font-bold mb-2 uppercase">Usuario:</label>
                <input type="text" name="username" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 bg-gray-50" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-xs font-bold mb-2 uppercase">Contraseña:</label>
                <input type="password" name="password" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500 bg-gray-50" required>
            </div>

            {% if form.errors %}
                <p class="text-red-500 text-xs italic mb-4 font-bold text-center">Usuario o contraseña incorrectos.</p>
            {% endif %}

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded shadow-lg transition">
                Entrar al Sistema
            </button>
        </form>
        
        <p class="text-center text-xs text-gray-400 mt-6">Contacte a Gerencia para obtener credenciales.</p>
    </div>

</body>
</html>
